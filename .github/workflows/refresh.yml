name: Daily chart refresh

on:
  schedule:
    # Runs daily at 06:00 UTC — after the midnight UTC candles close
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual refresh'
        required: false
        default: 'manual'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate chart (fresh OHLCV + existing tweets)
        run: npm run generate

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet index.html out/chart.html out/chart.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if chart changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html out/chart.html out/chart.json out/chart.csv
          git commit -m "Daily refresh: update OHLCV from GeckoTerminal"
          git push
